# Security Analyzer Knowledge Base
# Controles MCSB estructurados para validación automática

version: "1.0"

# Control ST-008: Diagnostic logging enabled
ST-008:
  control_id: "ST-008"
  service: "Logging & Telemetry"
  resource_types:
    - "azurerm_storage_account"
    - "azurerm_key_vault"
    - "azurerm_sql_server"
    - "azurerm_postgresql_server"
    - "azurerm_mysql_server"
  priority: "LT-3"
  severity: "MEDIUM"
  description: "Diagnostic logging enabled"
  requirement_type: "Must"
  implementation: "Partial"
  automation_type: "Custom"

  validation:
    checkov_rules: ["CKV_AZURE_20", "CKV_AZURE_101"]
    custom_check: "validate_diagnostic_logging"
    required_attributes:
      - "diagnostic_settings.log_analytics_workspace_id"
    forbidden_attributes: []
    required_blocks: ["diagnostic_settings"]
    forbidden_blocks: []

  evidence:
    type: "terraform_config"
    required_blocks: ["diagnostic_settings"]
    required_categories: ["StorageRead", "StorageWrite", "StorageDelete"]
    evidence_format: "json"

# Control KV-001: Key Vault soft delete enabled
KV-001:
  control_id: "KV-001"
  service: "Key Vault"
  resource_types:
    - "azurerm_key_vault"
  priority: "KV-1"
  severity: "CRITICAL"
  description: "Key Vault soft delete enabled"
  requirement_type: "Must"
  implementation: "Full"
  automation_type: "Custom"

  validation:
    checkov_rules: ["CKV_AZURE_3"]
    custom_check: "validate_key_vault_soft_delete"
    required_attributes:
      - "soft_delete_enabled"
      - "purge_protection_enabled"
    forbidden_attributes: []
    required_blocks: []
    forbidden_blocks: []

  evidence:
    type: "terraform_config"
    required_blocks: []
    required_categories: []
    evidence_format: "json"

# Control ST-001: Storage account encryption enabled
ST-001:
