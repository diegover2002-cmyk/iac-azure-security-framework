# Pilot Controls: 58 controles 100% automáticos para servicios más utilizados
# Servicios: Storage, Key Vault, App Service, AKS, Virtual Network

version: "1.0"
services:
  azure-storage-account:
    service_name: "Azure Storage Account"
    resource_type: "azurerm_storage_account"
    controls:
      - id: "ST-001"
        name: "Public blob access disabled"
        description: "Storage accounts must not allow public blob access"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "allow_blob_public_access"
          expected_value: "false"
          operator: "equals"
        checkov_rule: "CKV_AZURE_59"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                     = "securestorage123"
              allow_blob_public_access = false
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                     = "insecurestorage123"
              allow_blob_public_access = true
            }

      - id: "ST-002"
        name: "HTTPS only enabled"
        description: "Storage accounts must enforce HTTPS-only access"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "enable_https_traffic_only"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_3"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                        = "securestorage123"
              enable_https_traffic_only   = true
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                        = "insecurestorage123"
              enable_https_traffic_only   = false
            }

      - id: "ST-003"
        name: "Minimum TLS 1.2"
        description: "Storage accounts must enforce minimum TLS version 1.2"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "min_tls_version"
          expected_value: "1.2"
          operator: "equals"
        checkov_rule: "CKV_AZURE_44"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name            = "securestorage123"
              min_tls_version = "1.2"
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name            = "insecurestorage123"
              min_tls_version = "1.0"
            }

      - id: "ST-004"
        name: "Infrastructure encryption"
        description: "Storage accounts must have infrastructure encryption enabled"
        severity: "MEDIUM"
        priority: "SHOULD"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "infrastructure_encryption_enabled"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_256"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                              = "securestorage123"
              infrastructure_encryption_enabled = true
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                              = "insecurestorage123"
              infrastructure_encryption_enabled = false
            }

      - id: "ST-006"
        name: "Network firewall default deny"
        description: "Storage accounts must have network firewall with default deny"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "network_rules.default_action"
          expected_value: "Deny"
          operator: "equals"
        checkov_rule: "CKV_AZURE_35"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name = "securestorage123"
              network_rules {
                default_action = "Deny"
              }
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name = "insecurestorage123"
              network_rules {
                default_action = "Allow"
              }
            }

      - id: "ST-009"
        name: "Soft delete enabled"
        description: "Storage accounts must have soft delete enabled with retention >= 7 days"
        severity: "MEDIUM"
        priority: "SHOULD"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "soft_delete_retention_days"
          expected_value: "7"
          operator: "greater_than_or_equal"
        checkov_rule: "CKV_AZURE_111"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                        = "securestorage123"
              soft_delete_retention_days  = 7
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                        = "insecurestorage123"
              soft_delete_retention_days  = 1
            }

      - id: "ST-010"
        name: "Blob versioning enabled"
        description: "Storage accounts should have blob versioning enabled"
        severity: "LOW"
        priority: "NICE"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "is_versioning_enabled"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_119"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                   = "securestorage123"
              is_versioning_enabled  = true
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                   = "insecurestorage123"
              is_versioning_enabled  = false
            }

      - id: "ST-011"
        name: "Shared key access disabled"
        description: "Storage accounts must disable shared key access"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_storage_account"
          attribute: "allow_shared_key_access"
          expected_value: "false"
          operator: "equals"
        checkov_rule: "CKV2_AZURE_40"
        terraform_example:
          secure: |
            resource "azurerm_storage_account" "secure" {
              name                     = "securestorage123"
              allow_shared_key_access  = false
            }
          insecure: |
            resource "azurerm_storage_account" "insecure" {
              name                     = "insecurestorage123"
              allow_shared_key_access  = true
            }

  azure-key-vault:
    service_name: "Azure Key Vault"
    resource_type: "azurerm_key_vault"
    controls:
      - id: "KV-001"
        name: "Public network access disabled"
        description: "Key Vault must disable public network access"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_key_vault"
          attribute: "public_network_access_enabled"
          expected_value: "false"
          operator: "equals"
        checkov_rule: "CKV_AZURE_109"
        terraform_example:
          secure: |
            resource "azurerm_key_vault" "secure" {
              name                        = "securekeyvault"
              public_network_access_enabled = false
            }
          insecure: |
            resource "azurerm_key_vault" "insecure" {
              name                        = "insecurekeyvault"
              public_network_access_enabled = true
            }

      - id: "KV-003"
        name: "Network default action deny"
        description: "Key Vault must have network default action set to deny"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_key_vault"
          attribute: "network_acls.default_action"
          expected_value: "Deny"
          operator: "equals"
        checkov_rule: "CKV_AZURE_109"
        terraform_example:
          secure: |
            resource "azurerm_key_vault" "secure" {
              name = "securekeyvault"
              network_acls {
                default_action = "Deny"
              }
            }
          insecure: |
            resource "azurerm_key_vault" "insecure" {
              name = "insecurekeyvault"
              network_acls {
                default_action = "Allow"
              }
            }

      - id: "KV-005"
        name: "Soft delete enabled"
        description: "Key Vault must have soft delete enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_key_vault"
          attribute: "soft_delete_enabled"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_42"
        terraform_example:
          secure: |
            resource "azurerm_key_vault" "secure" {
              name               = "securekeyvault"
              soft_delete_enabled = true
            }
          insecure: |
            resource "azurerm_key_vault" "insecure" {
              name               = "insecurekeyvault"
              soft_delete_enabled = false
            }

      - id: "KV-006"
        name: "Purge protection enabled"
        description: "Key Vault must have purge protection enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_key_vault"
          attribute: "purge_protection_enabled"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_110"
        terraform_example:
          secure: |
            resource "azurerm_key_vault" "secure" {
              name                    = "securekeyvault"
              purge_protection_enabled = true
            }
          insecure: |
            resource "azurerm_key_vault" "insecure" {
              name                    = "insecurekeyvault"
              purge_protection_enabled = false
            }

      - id: "KV-007"
        name: "RBAC authorization model"
        description: "Key Vault must use RBAC authorization model"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_key_vault"
          attribute: "enable_rbac_authorization"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV2_AZURE_38"
        terraform_example:
          secure: |
            resource "azurerm_key_vault" "secure" {
              name                        = "securekeyvault"
              enable_rbac_authorization   = true
            }
          insecure: |
            resource "azurerm_key_vault" "insecure" {
              name                        = "insecurekeyvault"
              enable_rbac_authorization   = false
            }

  azure-app-service:
    service_name: "Azure App Service"
    resource_type: "azurerm_app_service"
    controls:
      - id: "AS-001"
        name: "HTTPS only enabled"
        description: "App Service must enforce HTTPS-only access"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_app_service"
          attribute: "https_only"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_14"
        terraform_example:
          secure: |
            resource "azurerm_app_service" "secure" {
              name       = "secureapp"
              https_only = true
            }
          insecure: |
            resource "azurerm_app_service" "insecure" {
              name       = "insecureapp"
              https_only = false
            }

      - id: "AS-002"
        name: "Minimum TLS 1.2"
        description: "App Service must enforce minimum TLS version 1.2"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_app_service"
          attribute: "minimum_tls_version"
          expected_value: "1.2"
          operator: "equals"
        checkov_rule: "CKV_AZURE_154"
        terraform_example:
          secure: |
            resource "azurerm_app_service" "secure" {
              name                = "secureapp"
              minimum_tls_version = "1.2"
            }
          insecure: |
            resource "azurerm_app_service" "insecure" {
              name                = "insecureapp"
              minimum_tls_version = "1.0"
            }

      - id: "AS-005"
        name: "Managed identity enabled"
        description: "App Service must have managed identity enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_app_service"
          attribute: "identity.type"
          expected_value: "SystemAssigned"
          operator: "equals"
        checkov_rule: "CKV_AZURE_16"
        terraform_example:
          secure: |
            resource "azurerm_app_service" "secure" {
              name = "secureapp"
              identity {
                type = "SystemAssigned"
              }
            }
          insecure: |
            resource "azurerm_app_service" "insecure" {
              name = "insecureapp"
              # No identity block
            }

      - id: "AS-007"
        name: "Diagnostic logging enabled"
        description: "App Service must have diagnostic logging enabled"
        severity: "MEDIUM"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_app_service"
          attribute: "logs"
          expected_value: "exists"
          operator: "exists"
        checkov_rule: "CKV_AZURE_13"
        terraform_example:
          secure: |
            resource "azurerm_app_service" "secure" {
              name = "secureapp"
              logs {
                http_logs {
                  file_system {
                    retention_in_days = 30
                    retention_in_mb   = 25
                  }
                }
              }
            }
          insecure: |
            resource "azurerm_app_service" "insecure" {
              name = "insecureapp"
              # No logs block
            }

      - id: "AS-011"
        name: "IP restrictions configured"
        description: "App Service should have IP restrictions configured"
        severity: "MEDIUM"
        priority: "SHOULD"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_app_service"
          attribute: "site_config.ip_restriction"
          expected_value: "exists"
          operator: "exists"
        checkov_rule: "CKV_AZURE_17"
        terraform_example:
          secure: |
            resource "azurerm_app_service" "secure" {
              name = "secureapp"
              site_config {
                ip_restriction {
                  ip_address = "10.0.0.0/8"
                }
              }
            }
          insecure: |
            resource "azurerm_app_service" "insecure" {
              name = "insecureapp"
              site_config {
                # No ip_restriction block
              }
            }

  azure-kubernetes-service:
    service_name: "Azure Kubernetes Service"
    resource_type: "azurerm_kubernetes_cluster"
    controls:
      - id: "AK-001"
        name: "API server authorized IP ranges"
        description: "AKS must have API server authorized IP ranges configured"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "api_server_authorized_ip_ranges"
          expected_value: "exists"
          operator: "exists"
        checkov_rule: "CKV_AZURE_6"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              api_server_authorized_ip_ranges = ["10.0.0.0/8"]
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              # No api_server_authorized_ip_ranges
            }

      - id: "AK-003"
        name: "Azure AD integration enabled"
        description: "AKS must have Azure AD integration enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "azure_active_directory.managed"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_5"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              azure_active_directory {
                managed = true
              }
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              # No azure_active_directory block
            }

      - id: "AK-004"
        name: "Local accounts disabled"
        description: "AKS must disable local accounts"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "aad_profile.managed"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_141"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              aad_profile {
                managed = true
              }
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              aad_profile {
                managed = false
              }
            }

      - id: "AK-005"
        name: "RBAC enabled"
        description: "AKS must have RBAC enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "role_based_access_control.enabled"
          expected_value: "true"
          operator: "equals"
        checkov_rule: "CKV_AZURE_5"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              role_based_access_control {
                enabled = true
              }
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              role_based_access_control {
                enabled = false
              }
            }

      - id: "AK-006"
        name: "Network policy enabled"
        description: "AKS must have network policy enabled"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "network_profile.network_policy"
          expected_value: "calico"
          operator: "equals"
        checkov_rule: "CKV_AZURE_7"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              network_profile {
                network_policy = "calico"
              }
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              network_profile {
                network_policy = "none"
              }
            }

      - id: "AK-007"
        name: "Auto-upgrade channel configured"
        description: "AKS should have auto-upgrade channel configured"
        severity: "MEDIUM"
        priority: "SHOULD"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_kubernetes_cluster"
          attribute: "auto_upgrade_channel"
          expected_value: "stable"
          operator: "equals"
        checkov_rule: "CKV_AZURE_170"
        terraform_example:
          secure: |
            resource "azurerm_kubernetes_cluster" "secure" {
              name = "secureaks"
              auto_upgrade_channel = "stable"
            }
          insecure: |
            resource "azurerm_kubernetes_cluster" "insecure" {
              name = "insecureaks"
              # No auto_upgrade_channel
            }

  azure-virtual-network:
    service_name: "Azure Virtual Network"
    resource_type: "azurerm_virtual_network"
    controls:
      - id: "VN-001"
        name: "Subnets associated with NSG"
        description: "VNet subnets must be associated with Network Security Groups"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "relationship"
          resource_type: "azurerm_subnet"
          relationship: "network_security_group_id"
          expected_value: "exists"
          operator: "exists"
        checkov_rule: "CKV2_AZURE_31"
        terraform_example:
          secure: |
            resource "azurerm_subnet" "secure" {
              name                 = "securesubnet"
              virtual_network_name = azurerm_virtual_network.example.name
              network_security_group_id = azurerm_network_security_group.example.id
            }
          insecure: |
            resource "azurerm_subnet" "insecure" {
              name                 = "insecuresubnet"
              virtual_network_name = azurerm_virtual_network.example.name
              # No network_security_group_id
            }

      - id: "VN-003"
        name: "No unrestricted SSH"
        description: "NSG must not allow unrestricted SSH access (0.0.0.0/0 to port 22)"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          expected_value: "0.0.0.0/0"
          operator: "not_equals"
          condition: "destination_port_range == 22"
        checkov_rule: "CKV_AZURE_10"
        terraform_example:
          secure: |
            resource "azurerm_network_security_group" "secure" {
              name = "securensg"
              security_rule {
                name                       = "Allow-SSH"
                source_address_prefix      = "10.0.0.0/8"
                destination_port_range     = "22"
              }
            }
          insecure: |
            resource "azurerm_network_security_group" "insecure" {
              name = "insecuresg"
              security_rule {
                name                       = "Allow-SSH"
                source_address_prefix      = "0.0.0.0/0"
                destination_port_range     = "22"
              }
            }

      - id: "VN-004"
        name: "No unrestricted RDP"
        description: "NSG must not allow unrestricted RDP access (0.0.0.0/0 to port 3389)"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          expected_value: "0.0.0.0/0"
          operator: "not_equals"
          condition: "destination_port_range == 3389"
        checkov_rule: "CKV_AZURE_9"
        terraform_example:
          secure: |
            resource "azurerm_network_security_group" "secure" {
              name = "securensg"
              security_rule {
                name                       = "Allow-RDP"
                source_address_prefix      = "10.0.0.0/8"
                destination_port_range     = "3389"
              }
            }
          insecure: |
            resource "azurerm_network_security_group" "insecure" {
              name = "insecuresg"
              security_rule {
                name                       = "Allow-RDP"
                source_address_prefix      = "0.0.0.0/0"
                destination_port_range     = "3389"
              }
            }

      - id: "VN-005"
        name: "DDoS protection enabled"
        description: "VNet should have DDoS protection enabled"
        severity: "MEDIUM"
        priority: "SHOULD"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_virtual_network"
          attribute: "ddos_protection_plan"
          expected_value: "exists"
          operator: "exists"
        checkov_rule: "CKV_AZURE_182"
        terraform_example:
          secure: |
            resource "azurerm_virtual_network" "secure" {
              name = "securevnet"
              ddos_protection_plan {
                id     = azurerm_network_ddos_protection_plan.example.id
                enable = true
              }
            }
          insecure: |
            resource "azurerm_virtual_network" "insecure" {
              name = "insecurevnet"
              # No ddos_protection_plan
            }

      - id: "VN-008"
        name: "No wildcard inbound rules"
        description: "NSG must not have wildcard inbound rules (any/any)"
        severity: "HIGH"
        priority: "MUST"
        iac_checkable: "YES"
        validation:
          type: "attribute"
          resource_type: "azurerm_network_security_group"
          attribute: "security_rule.source_address_prefix"
          expected_value: "*"
          operator: "not_equals"
          condition: "direction == 'Inbound'"
        terraform_example:
          secure: |
            resource "azurerm_network_security_group" "secure" {
              name = "securensg"
              security_rule {
                name                       = "Allow-HTTP"
                source_address_prefix      = "10.0.0.0/8"
                destination_port_range     = "80"
                direction                  = "Inbound"
              }
            }
          insecure: |
            resource "azurerm_network_security_group" "insecure" {
              name = "insecuresg"
              security_rule {
                name                       = "Allow-All"
                source_address_prefix      = "*"
                destination_port_range     = "*"
                direction                  = "Inbound"
              }
            }
